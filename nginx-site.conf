# SeeBeauty Nginx 站点配置文件
# 这个文件应该放在 /etc/nginx/sites-available/ 目录下

# 上游服务器配置
upstream api_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# 限流配置
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# HTTP 主配置
server {
    listen 80;
    server_name www.seeurbeauty.com;

    # 文档根目录 - 前端构建后的静态文件
    root /root/SeeBeauty/frontend/dist;
    index index.html;

    # 日志配置
    access_log /var/log/nginx/seebeauty_access.log;
    error_log /var/log/nginx/seebeauty_error.log;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 客户端上传限制
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain;

    # API 路由 - 代理到后端 Express 服务器
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 图片上传路由
    location /api/images/upload {
        limit_req zone=upload_limit burst=5 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 静态文件服务 - 上传的图片和分享卡片
    location /uploads/ {
        alias /root/SeeBeauty/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, no-transform";

        location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 健康检查
    location /health {
        proxy_pass http://api_backend/health;
        access_log off;
    }

    # 前端应用 - SPA 路由处理
    location / {
        try_files $uri $uri/ /index.html;

        # HTML 文件不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # 错误页面
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}

# seeurbeauty.com 重定向到 www.seeurbeauty.com
server {
    listen 80;
    server_name seeurbeauty.com;
    return 301 http://www.seeurbeauty.com$request_uri;
}